<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Layout Simples Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>Meu Site</h1>
        <nav>
            <ul class="menu">
                <li>Home</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>

    <main class="main-container">
        <section class="content">
            <h2>Conteúdo Principal</h2>
            <p>Aqui vai o texto ou as postagens do seu site.</p>
        </section>

        <aside class="sidebar">
            <h3>Barra Lateral</h3>
            <p>Links úteis ou anúncios.</p>
        </aside>
    </main>

    <footer class="footer">
        <p>&copy; 2026 - Desenvolvido na Aula de Web</p>
    </footer>

</body>
</html>
